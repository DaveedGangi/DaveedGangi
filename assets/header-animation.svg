<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="300" viewBox="0 0 1200 300">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="50%" style="stop-color:#1a1b27"/>
      <stop offset="100%" style="stop-color:#0d1117"/>
    </linearGradient>

    <!-- Animated glow filter — breathing effect -->
    <filter id="glow">
      <feGaussianBlur result="blur">
        <animate attributeName="stdDeviation" values="2;5;2" dur="4s" repeatCount="indefinite"/>
      </feGaussianBlur>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Strong glow -->
    <filter id="glow-strong">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Particle glow -->
    <filter id="particle-glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <style>
    @keyframes pulse {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 1; }
    }

    @keyframes breathe {
      0%, 100% { opacity: 0.7; }
      50% { opacity: 1; }
    }

    @keyframes dash-move {
      to { stroke-dashoffset: -1000; }
    }

    @keyframes particle-float {
      0% { transform: translateY(0) translateX(0); opacity: 0; }
      20% { opacity: 1; }
      80% { opacity: 1; }
      100% { transform: translateY(-120px) translateX(30px); opacity: 0; }
    }

    @keyframes particle-float-2 {
      0% { transform: translateY(0) translateX(0); opacity: 0; }
      20% { opacity: 0.8; }
      80% { opacity: 0.8; }
      100% { transform: translateY(-100px) translateX(-25px); opacity: 0; }
    }

    @keyframes code-scroll {
      0% { transform: translateY(60px); opacity: 0; }
      10% { opacity: 0.15; }
      90% { opacity: 0.15; }
      100% { transform: translateY(-60px); opacity: 0; }
    }

    @keyframes wave {
      0%, 100% { d: path("M0,250 C200,230 400,270 600,250 C800,230 1000,270 1200,250 L1200,300 L0,300 Z"); }
      50% { d: path("M0,250 C200,270 400,230 600,250 C800,270 1000,230 1200,250 L1200,300 L0,300 Z"); }
    }

    @keyframes cursor-blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    @keyframes orbit {
      from { transform: rotate(0deg) translateX(90px) rotate(0deg); }
      to { transform: rotate(360deg) translateX(90px) rotate(-360deg); }
    }

    @keyframes orbit-2 {
      from { transform: rotate(120deg) translateX(110px) rotate(-120deg); }
      to { transform: rotate(480deg) translateX(110px) rotate(-480deg); }
    }

    @keyframes orbit-3 {
      from { transform: rotate(240deg) translateX(75px) rotate(-240deg); }
      to { transform: rotate(600deg) translateX(75px) rotate(-600deg); }
    }

    @keyframes shimmer {
      0% { stop-color: #70a5fd; }
      50% { stop-color: #a78bfa; }
      100% { stop-color: #70a5fd; }
    }

    @keyframes line-draw {
      from { stroke-dashoffset: 200; }
      to { stroke-dashoffset: 0; }
    }

    .subtitle-text {
      animation: breathe 4s ease-in-out infinite 0.5s;
    }

    .particle {
      animation: particle-float 4s ease-in-out infinite;
    }

    .particle-2 {
      animation: particle-float-2 5s ease-in-out infinite 1s;
    }

    .code-line {
      animation: code-scroll 6s linear infinite;
    }

    .cursor {
      animation: cursor-blink 1s step-end infinite;
    }

    .orbit-dot-1 {
      animation: orbit 8s linear infinite;
      transform-origin: 180px 150px;
    }

    .orbit-dot-2 {
      animation: orbit-2 12s linear infinite;
      transform-origin: 180px 150px;
    }

    .orbit-dot-3 {
      animation: orbit-3 6s linear infinite;
      transform-origin: 180px 150px;
    }

    .circuit-line {
      stroke-dasharray: 8 4;
      animation: dash-move 20s linear infinite;
    }
  </style>

  <!-- Background -->
  <rect width="1200" height="300" fill="url(#bg)"/>

  <!-- Circuit board lines (subtle background pattern) -->
  <g opacity="0.08">
    <line x1="100" y1="0" x2="100" y2="300" stroke="#70a5fd" stroke-width="1" class="circuit-line"/>
    <line x1="300" y1="0" x2="300" y2="300" stroke="#70a5fd" stroke-width="1" class="circuit-line" style="animation-delay: -3s"/>
    <line x1="500" y1="0" x2="500" y2="300" stroke="#70a5fd" stroke-width="1" class="circuit-line" style="animation-delay: -7s"/>
    <line x1="700" y1="0" x2="700" y2="300" stroke="#70a5fd" stroke-width="1" class="circuit-line" style="animation-delay: -5s"/>
    <line x1="900" y1="0" x2="900" y2="300" stroke="#70a5fd" stroke-width="1" class="circuit-line" style="animation-delay: -2s"/>
    <line x1="1100" y1="0" x2="1100" y2="300" stroke="#70a5fd" stroke-width="1" class="circuit-line" style="animation-delay: -9s"/>
    <line x1="0" y1="80" x2="1200" y2="80" stroke="#70a5fd" stroke-width="1" class="circuit-line" style="animation-delay: -4s"/>
    <line x1="0" y1="160" x2="1200" y2="160" stroke="#70a5fd" stroke-width="1" class="circuit-line" style="animation-delay: -6s"/>
    <line x1="0" y1="240" x2="1200" y2="240" stroke="#70a5fd" stroke-width="1" class="circuit-line" style="animation-delay: -8s"/>
  </g>

  <!-- Floating code snippets (left side, subtle) -->
  <g opacity="0.12" font-family="'Courier New', monospace" font-size="11" fill="#70a5fd">
    <text x="40" y="60" class="code-line">const app = express();</text>
    <text x="30" y="100" class="code-line" style="animation-delay: -1.5s">await db.query(sql);</text>
    <text x="50" y="140" class="code-line" style="animation-delay: -3s">export default Home;</text>
    <text x="35" y="180" class="code-line" style="animation-delay: -4.5s">npm run build</text>
  </g>

  <!-- Floating code snippets (right side, subtle) -->
  <g opacity="0.12" font-family="'Courier New', monospace" font-size="11" fill="#70a5fd">
    <text x="950" y="70" class="code-line" style="animation-delay: -2s">git push origin main</text>
    <text x="960" y="110" class="code-line" style="animation-delay: -3.5s">return res.json(data);</text>
    <text x="940" y="150" class="code-line" style="animation-delay: -5s">useEffect(() => {});</text>
    <text x="970" y="190" class="code-line" style="animation-delay: -1s">docker compose up</text>
  </g>

  <!-- Orbital rings around left decoration -->
  <g>
    <circle cx="180" cy="150" r="90" fill="none" stroke="#70a5fd" stroke-width="0.5" opacity="0.15"/>
    <circle cx="180" cy="150" r="110" fill="none" stroke="#70a5fd" stroke-width="0.3" opacity="0.1"/>
    <circle cx="180" cy="150" r="75" fill="none" stroke="#a78bfa" stroke-width="0.3" opacity="0.1"/>

    <!-- Orbiting dots -->
    <circle cx="0" cy="0" r="3" fill="#70a5fd" filter="url(#particle-glow)" class="orbit-dot-1" opacity="0.8"/>
    <circle cx="0" cy="0" r="2" fill="#a78bfa" filter="url(#particle-glow)" class="orbit-dot-2" opacity="0.6"/>
    <circle cx="0" cy="0" r="2.5" fill="#70e0fd" filter="url(#particle-glow)" class="orbit-dot-3" opacity="0.7"/>
  </g>

  <!-- Orbiting elements on the right side -->
  <g>
    <circle cx="1020" cy="150" r="80" fill="none" stroke="#70a5fd" stroke-width="0.4" opacity="0.12"/>
    <circle cx="1020" cy="150" r="60" fill="none" stroke="#a78bfa" stroke-width="0.3" opacity="0.08"/>
  </g>

  <!-- Main name text — animated glow breathing -->
  <g filter="url(#glow)">
    <text x="600" y="120" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="52" font-weight="bold" fill="#70a5fd" letter-spacing="6">
      DAVEED GANGI
    </text>
  </g>

  <!-- Subtitle — opacity breathing -->
  <g class="subtitle-text">
    <text x="600" y="165" text-anchor="middle" font-family="'Courier New', monospace" font-size="16" fill="#8b949e" letter-spacing="2">
      Full Stack Developer
    </text>
    <!-- Blinking cursor -->
    <rect x="710" y="152" width="8" height="16" fill="#70a5fd" class="cursor"/>
  </g>

  <!-- Terminal prompt line — subtle pulse -->
  <g>
    <text x="470" y="200" font-family="'Courier New', monospace" font-size="13" fill="#7ee787">$</text>
    <text x="485" y="200" font-family="'Courier New', monospace" font-size="13" fill="#8b949e"> building the future...</text>
    <animate attributeName="opacity" values="0.4;0.7;0.4" dur="5s" repeatCount="indefinite"/>
  </g>

  <!-- Floating particles -->
  <circle cx="350" cy="230" r="2" fill="#70a5fd" filter="url(#particle-glow)" class="particle" opacity="0.6"/>
  <circle cx="500" cy="250" r="1.5" fill="#a78bfa" filter="url(#particle-glow)" class="particle" style="animation-delay: -1s" opacity="0.5"/>
  <circle cx="700" cy="240" r="2" fill="#70e0fd" filter="url(#particle-glow)" class="particle-2" opacity="0.6"/>
  <circle cx="850" cy="220" r="1.5" fill="#70a5fd" filter="url(#particle-glow)" class="particle" style="animation-delay: -2s" opacity="0.5"/>
  <circle cx="250" cy="60" r="1.5" fill="#a78bfa" filter="url(#particle-glow)" class="particle-2" style="animation-delay: -3s" opacity="0.4"/>
  <circle cx="950" cy="80" r="2" fill="#70a5fd" filter="url(#particle-glow)" class="particle" style="animation-delay: -2.5s" opacity="0.5"/>
  <circle cx="150" cy="250" r="1" fill="#70e0fd" filter="url(#particle-glow)" class="particle-2" style="animation-delay: -0.5s" opacity="0.4"/>
  <circle cx="1050" cy="230" r="1.5" fill="#a78bfa" filter="url(#particle-glow)" class="particle" style="animation-delay: -1.5s" opacity="0.5"/>

  <!-- Bottom wave -->
  <path fill="#70a5fd" opacity="0.06" style="animation: wave 6s ease-in-out infinite">
    <animate attributeName="d"
      values="M0,250 C200,230 400,270 600,250 C800,230 1000,270 1200,250 L1200,300 L0,300 Z;
              M0,250 C200,270 400,230 600,250 C800,270 1000,230 1200,250 L1200,300 L0,300 Z;
              M0,250 C200,230 400,270 600,250 C800,230 1000,270 1200,250 L1200,300 L0,300 Z"
      dur="6s" repeatCount="indefinite"/>
  </path>
  <path fill="#70a5fd" opacity="0.03">
    <animate attributeName="d"
      values="M0,265 C200,245 400,285 600,265 C800,245 1000,285 1200,265 L1200,300 L0,300 Z;
              M0,265 C200,285 400,245 600,265 C800,285 1000,245 1200,265 L1200,300 L0,300 Z;
              M0,265 C200,245 400,285 600,265 C800,245 1000,285 1200,265 L1200,300 L0,300 Z"
      dur="8s" repeatCount="indefinite"/>
  </path>

  <!-- Bottom accent line -->
  <line x1="400" y1="225" x2="800" y2="225" stroke="#70a5fd" stroke-width="1" opacity="0.15">
    <animate attributeName="x1" values="400;350;400" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="x2" values="800;850;800" dur="4s" repeatCount="indefinite"/>
  </line>

</svg>
